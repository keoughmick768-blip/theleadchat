<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - TheLeadChat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg-dark: #0f0f23;
            --bg-card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }
        
        .header {
            background: rgba(15, 15, 35, 0.95);
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .logo span { color: white; }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .page-title {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        
        .page-subtitle {
            color: var(--text-muted);
            margin-bottom: 40px;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 40px;
        }
        
        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }
        
        .card {
            background: var(--bg-card);
            padding: 28px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 24px;
        }
        
        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 6px;
            color: var(--text-muted);
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-dark);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: var(--primary-dark);
        }
        
        .btn-danger {
            background: var(--danger);
        }
        
        .btn-sm {
            padding: 8px 16px;
            font-size: 0.9rem;
        }
        
        .client-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .client-item {
            background: var(--bg-dark);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .client-info h4 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }
        
        .client-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .client-info .status {
            display: inline-block;
            background: rgba(16, 185, 129, 0.2);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 8px;
        }
        
        .client-actions {
            display: flex;
            gap: 8px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 16px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        
        .section-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .section-tab {
            padding: 10px 20px;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .section-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        .section-content {
            display: none;
        }
        
        .section-content.active {
            display: block;
        }
        
        .twilio-status {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--bg-dark);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .twilio-status.connected {
            border: 2px solid var(--primary);
        }
        
        .twilio-status.disconnected {
            border: 2px solid var(--danger);
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--danger);
        }
        
        .twilio-status.connected .status-dot {
            background: var(--primary);
        }
        
        .phone-numbers-list {
            margin-top: 20px;
        }
        
        .phone-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--bg-dark);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .phone-item .number {
            font-family: monospace;
            font-size: 1.1rem;
        }
        
        .phone-item .assigned {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        
        .available-numbers {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .available-number {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg-dark);
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        
        .available-number:hover {
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">Missed<span>Call</span>AI <span style="color: var(--primary); font-size: 0.8rem;">Admin</span></div>
            <a href="index.html" class="btn btn-sm">View Site</a>
        </div>
    </div>
    
    <div class="container">
        <h1 class="page-title">Admin Dashboard</h1>
        <p class="page-subtitle">Manage your clients and Twilio integration</p>
        
        <!-- Section Tabs -->
        <div class="section-tabs">
            <button class="section-tab active" onclick="showSection('clients')">👥 Clients</button>
            <button class="section-tab" onclick="showSection('twilio')">📱 Twilio</button>
            <button class="section-tab" onclick="showSection('numbers')">🔢 Phone Numbers</button>
        </div>
        
        <!-- Clients Section -->
        <div class="section-content active" id="section-clients">
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalClients">0</div>
                <div class="stat-label">Total Clients</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeClients">0</div>
                <div class="stat-label">Active</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="monthlyRevenue">$0</div>
                <div class="stat-label">Monthly Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalCalls">0</div>
                <div class="stat-label">Total Calls</div>
            </div>
        </div>
        
        <div class="grid">
            <!-- Add Client Form -->
            <div>
                <div class="card">
                    <h3 class="card-title">➕ Add New Client</h3>
                    
                    <form id="addClientForm">
                        <div class="form-group">
                            <label>Business Name</label>
                            <input type="text" name="businessName" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Owner Name</label>
                            <input type="text" name="ownerName" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="email" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" name="phone" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Services</label>
                            <textarea name="services" rows="2" placeholder="e.g., Real Estate, Home Cleaning"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label>Areas Served</label>
                            <input type="text" name="areas" placeholder="e.g., Charlotte NC">
                        </div>
                        
                        <div class="form-group">
                            <label>Twilio Phone Number</label>
                            <input type="tel" name="twilioNumber" placeholder="+15551234567">
                        </div>
                        
                        <button type="submit" class="btn" style="width: 100%;">Create Client Account</button>
                    </form>
                </div>
            </div>
            
            <!-- Client List -->
            <div>
                <div class="card">
                    <h3 class="card-title">👥 Your Clients</h3>
                    <div class="client-list" id="clientList">
                        <div class="empty-state">No clients yet. Add your first client!</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Load clients from localStorage
        let clients = JSON.parse(localStorage.getItem('TheLeadChat_clients') || '[]');
        
        // Render client list
        function renderClients() {
            const list = document.getElementById('clientList');
            
            if (clients.length === 0) {
                list.innerHTML = '<div class="empty-state">No clients yet. Add your first client!</div>';
                return;
            }
            
            list.innerHTML = clients.map((client, index) => `
                <div class="client-item">
                    <div class="client-info">
                        <h4>${client.businessName}</h4>
                        <p>${client.ownerName} • ${client.email}</p>
                        <p>📱 ${client.phone}</p>
                        <span class="status">Active</span>
                    </div>
                    <div class="client-actions">
                        <button class="btn btn-sm" onclick="viewClient(${index})">View</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteClient(${index})">Delete</button>
                    </div>
                </div>
            `).join('');
            
            // Update stats
            document.getElementById('totalClients').textContent = clients.length;
            document.getElementById('activeClients').textContent = clients.length;
            document.getElementById('monthlyRevenue').textContent = '$' + (clients.length * 59);
            document.getElementById('totalCalls').textContent = clients.length * 12; // Demo number
        }
        
        // Add new client
        document.getElementById('addClientForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const client = {
                businessName: formData.get('businessName'),
                ownerName: formData.get('ownerName'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                services: formData.get('services'),
                areas: formData.get('areas'),
                twilioNumber: formData.get('twilioNumber'),
                createdAt: new Date().toISOString(),
                status: 'active'
            };
            
            clients.push(client);
            localStorage.setItem('TheLeadChat_clients', JSON.stringify(clients));
            
            this.reset();
            renderClients();
            alert(`Client "${client.businessName}" added successfully!`);
        });
        
        // View client details
        function viewClient(index) {
            const client = clients[index];
            alert(`Client Details:\n\nBusiness: ${client.businessName}\nOwner: ${client.ownerName}\nEmail: ${client.email}\nPhone: ${client.phone}\nServices: ${client.services}\nAreas: ${client.areas}\nTwilio: ${client.twilioNumber || 'Not set'}`);
        }
        
        // Delete client
        function deleteClient(index) {
            const client = clients[index];
            if (confirm(`Are you sure you want to delete ${client.businessName}?`)) {
                clients.splice(index, 1);
                localStorage.setItem('TheLeadChat_clients', JSON.stringify(clients));
                renderClients();
            }
        }
        
        // Initial render
        renderClients();
    </script>
</body>
</html>
