<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TheLeadChat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg-dark: #0f0f23;
            --bg-card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(ellipse at top, rgba(16, 185, 129, 0.08) 0%, transparent 60%);
        }
        
        .container {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
        }
        
        .logo {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
            text-decoration: none;
        }
        
        .logo span { color: white; }
        
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        
        .header p {
            color: var(--text-muted);
        }
        
        .form-card {
            background: var(--bg-card);
            padding: 36px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--text-muted);
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-dark);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .form-group input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        
        .success-msg {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        
        .btn {
            display: block;
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        
        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            margin-top: 12px;
        }
        
        .btn-outline:hover {
            background: rgba(16, 185, 129, 0.1);
        }
        
        .links {
            text-align: center;
            margin-top: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }
        
        .links a:hover {
            color: var(--primary);
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        
        .divider span {
            padding: 0 16px;
        }
        
        .footer {
            text-align: center;
            margin-top: 32px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        
        .footer a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo">Missed<span>Call</span>AI</a>
        
        <div class="header">
            <h1>Welcome Back</h1>
            <p>Sign in to manage your AI receptionist</p>
        </div>
        
        <div class="form-card">
            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@yourbusiness.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                
                <button type="submit" class="btn" id="submitBtn">Sign In</button>
            </form>
            
            <div class="divider"><span>or</span></div>
            
            <a href="signup.html" class="btn btn-outline">Create New Account</a>
        </div>
        
        <div class="links">
            <a href="forgot-password.html">Forgot your password?</a>
        </div>
        
        <div class="footer">
            <p>Need help? <a href="mailto:support@TheLeadChat.com">Contact Support</a></p>
        </div>
    </div>
    
    <script>
        // Check if already logged in
        const token = localStorage.getItem('TheLeadChat_token');
        if (token) {
            const user = JSON.parse(localStorage.getItem('TheLeadChat_user') || '{}');
            if (user.setupComplete === false) {
                window.location.href = 'setup.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            const submitBtn = document.getElementById('submitBtn');
            
            errorDiv.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.error || 'Login failed. Please check your credentials.');
                }
                
                // Save token and user data
                localStorage.setItem('TheLeadChat_token', result.token);
                localStorage.setItem('TheLeadChat_user', JSON.stringify(result.user));
                
                // Redirect based on setup status
                if (result.user.setupComplete === false) {
                    window.location.href = 'setup.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
                
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
