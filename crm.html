<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheLeadChat CRM - Client Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-light: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            background: var(--bg-card);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--bg-light);
        }
        
        .logo { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
        
        .nav { display: flex; gap: 20px; }
        .nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav a:hover, .nav a.active {
            background: var(--bg-light);
            color: var(--text);
        }
        
        /* Main */
        .container { padding: 30px; max-width: 1400px; margin: 0 auto; }
        
        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-number { font-size: 2.5rem; font-weight: 700; color: var(--primary); }
        .stat-label { color: var(--text-muted); margin-top: 8px; }
        
        /* Pipeline */
        .pipeline {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stage {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
        }
        
        .stage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--bg-light);
        }
        
        .stage-title { font-weight: 600; }
        .stage-count { 
            background: var(--bg-light); 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 0.9rem;
        }
        
        /* Leads */
        .lead {
            background: var(--bg-light);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .lead:hover { transform: translateY(-2px); }
        
        .lead-name { font-weight: 600; margin-bottom: 4px; }
        .lead-company { color: var(--text-muted); font-size: 0.9rem; }
        .lead-value { 
            color: var(--primary); 
            font-weight: 600; 
            margin-top: 8px; 
        }
        
        /* Forms */
        .form-section {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        
        .form-section h2 { margin-bottom: 20px; }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-light);
            border: 1px solid var(--bg-light);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        button {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        button:hover { background: var(--primary-dark); }
        
        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
        }
        
        th, td { padding: 16px; text-align: left; border-bottom: 1px solid var(--bg-light); }
        th { background: var(--bg-light); font-weight: 600; }
        
        .status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        .status.active { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .status.pending { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        
        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab {
            padding: 10px 20px;
            background: var(--bg-card);
            border-radius: 8px;
            cursor: pointer;
        }
        .tab.active { background: var(--primary); }
        
        /* Mobile */
        @media (max-width: 768px) {
            .pipeline { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 16px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">📊 TheLeadChat CRM</div>
        <div class="nav">
            <a href="#" class="active" onclick="showTab('pipeline')">Pipeline</a>
            <a href="#" onclick="showTab('clients')">Clients</a>
            <a href="#" onclick="showTab('leads')">Leads</a>
            <a href="#" onclick="showTab('automation')">Automation</a>
            <a href="#" onclick="showTab('settings')">Settings</a>
        </div>
    </div>
    
    <div class="container">
        <!-- Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalLeads">0</div>
                <div class="stat-label">Total Leads</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalClients">0</div>
                <div class="stat-label">Active Clients</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalRevenue">$0</div>
                <div class="stat-label">Monthly Revenue</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="conversionRate">0%</div>
                <div class="stat-label">Conversion Rate</div>
            </div>
        </div>
        
        <!-- Add New Lead Form -->
        <div class="form-section">
            <h2>➕ Add New Lead/Client</h2>
            <form id="addLeadForm">
                <div class="form-grid">
                    <div>
                        <input type="text" id="leadName" placeholder="Contact Name" required>
                    </div>
                    <div>
                        <input type="text" id="leadCompany" placeholder="Company Name">
                    </div>
                    <div>
                        <input type="email" id="leadEmail" placeholder="Email Address">
                    </div>
                    <div>
                        <input type="tel" id="leadPhone" placeholder="Phone Number">
                    </div>
                    <div>
                        <select id="leadStage">
                            <option value="new">New Lead</option>
                            <option value="contacted">Contacted</option>
                            <option value="proposal">Proposal Sent</option>
                            <option value="negotiation">Negotiation</option>
                            <option value="client">Client</option>
                        </select>
                    </div>
                    <div>
                        <select id="leadPlan">
                            <option value="">Select Plan</option>
                            <option value="starter">Starter - $59/mo</option>
                            <option value="professional">Professional - $97/mo</option>
                        </select>
                    </div>
                </div>
                <button type="submit" style="margin-top: 20px;">Add to Pipeline</button>
            </form>
        </div>
        
        <!-- Pipeline -->
        <div class="pipeline">
            <div class="stage">
                <div class="stage-header">
                    <span class="stage-title">🆕 New Leads</span>
                    <span class="stage-count" id="newCount">0</span>
                </div>
                <div id="newLeads"></div>
            </div>
            
            <div class="stage">
                <div class="stage-header">
                    <span class="stage-title">📞 Contacted</span>
                    <span class="stage-count" id="contactedCount">0</span>
                </div>
                <div id="contactedLeads"></div>
            </div>
            
            <div class="stage">
                <div class="stage-header">
                    <span class="stage-title">📄 Proposal</span>
                    <span class="stage-count" id="proposalCount">0</span>
                </div>
                <div id="proposalLeads"></div>
            </div>
            
            <div class="stage">
                <div class="stage-header">
                    <span class="stage-title">💰 Clients</span>
                    <span class="stage-count" id="clientCount">0</span>
                </div>
                <div id="clientLeads"></div>
            </div>
        </div>
        
        <!-- Clients Table -->
        <div id="clientsTab" style="display: none;">
            <div class="form-section">
                <h2>👥 Client List</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Company</th>
                            <th>Plan</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="clientTable"></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // Data Store (localStorage)
        let leads = JSON.parse(localStorage.getItem('theleadchat_crm')) || [];
        
        function saveLeads() {
            localStorage.setItem('theleadchat_crm', JSON.stringify(leads));
            renderPipeline();
            updateStats();
        }
        
        function updateStats() {
            const totalLeads = leads.length;
            const clients = leads.filter(l => l.stage === 'client');
            const totalClients = clients.length;
            const revenue = clients.reduce((sum, l) => sum + (l.plan === 'professional' ? 97 : 59), 0);
            const conversionRate = totalLeads > 0 ? Math.round((totalClients / totalLeads) * 100) : 0;
            
            document.getElementById('totalLeads').textContent = totalLeads;
            document.getElementById('totalClients').textContent = totalClients;
            document.getElementById('totalRevenue').textContent = '$' + revenue;
            document.getElementById('conversionRate').textContent = conversionRate + '%';
        }
        
        function renderPipeline() {
            const stages = {
                new: 'newLeads',
                contacted: 'contactedLeads',
                proposal: 'proposalLeads',
                negotiation: 'proposalLeads',
                client: 'clientLeads'
            };
            
            const counts = { new: 0, contacted: 0, proposal: 0, client: 0 };
            
            Object.keys(stages).forEach(stage => {
                const container = document.getElementById(stages[stage]);
                container.innerHTML = '';
                
                leads.filter(l => l.stage === stage).forEach(lead => {
                    counts[stage]++;
                    const div = document.createElement('div');
                    div.className = 'lead';
                    div.innerHTML = `
                        <div class="lead-name">${lead.name}</div>
                        <div class="lead-company">${lead.company || 'No company'}</div>
                        ${lead.plan ? `<div class="lead-value">${lead.plan === 'professional' ? '$97/mo' : '$59/mo'}</div>` : ''}
                    `;
                    container.appendChild(div);
                });
            });
            
            document.getElementById('newCount').textContent = counts.new;
            document.getElementById('contactedCount').textContent = counts.contacted;
            document.getElementById('proposalCount').textContent = counts.proposal;
            document.getElementById('clientCount').textContent = counts.client;
        }
        
        function showTab(tab) {
            document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'clients') {
                renderClientTable();
                document.getElementById('clientsTab').style.display = 'block';
            } else {
                document.getElementById('clientsTab').style.display = 'none';
            }
        }
        
        function renderClientTable() {
            const clients = leads.filter(l => l.stage === 'client');
            const tbody = document.getElementById('clientTable');
            tbody.innerHTML = '';
            
            clients.forEach(client => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${client.name}</td>
                    <td>${client.company || '-'}</td>
                    <td>${client.plan === 'professional' ? 'Professional $97' : client.plan === 'starter' ? 'Starter $59' : '-'}</td>
                    <td>${client.phone || '-'}</td>
                    <td><span class="status active">Active</span></td>
                    <td>
                        <button onclick="deleteLead('${client.id}')" style="background: var(--danger); padding: 8px 12px; font-size: 0.9rem;">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
        
        function deleteLead(id) {
            if (confirm('Delete this lead?')) {
                leads = leads.filter(l => l.id !== id);
                saveLeads();
            }
        }
        
        // Add Lead Form
        document.getElementById('addLeadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const lead = {
                id: Date.now().toString(),
                name: document.getElementById('leadName').value,
                company: document.getElementById('leadCompany').value,
                email: document.getElementById('leadEmail').value,
                phone: document.getElementById('leadPhone').value,
                stage: document.getElementById('leadStage').value,
                plan: document.getElementById('leadPlan').value,
                created: new Date().toISOString()
            };
            
            leads.push(lead);
            saveLeads();
            
            this.reset();
            alert('Lead added to pipeline!');
        });
        
        // Initialize
        renderPipeline();
        updateStats();
    </script>
</body>
</html>
