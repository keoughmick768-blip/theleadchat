<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leads - NineM's AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 { font-size: 24px; }
        .header a { color: #fff; text-decoration: none; opacity: 0.8; }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #11112a;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-card .label {
            color: #888;
            margin-top: 5px;
        }
        
        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #667eea;
            color: #fff;
        }
        
        .btn-primary:hover { background: #5a6fd6; }
        
        .leads-grid {
            display: grid;
            gap: 15px;
        }
        
        .lead-card {
            background: #11112a;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
        }
        
        .lead-info h3 {
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .lead-info .phone {
            color: #667eea;
            font-size: 14px;
        }
        
        .lead-info .source {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .lead-info .time {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .lead-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }
        
        .btn-convert {
            background: #10b981;
            color: #fff;
        }
        
        .btn-view {
            background: #1e3a5f;
            color: #fff;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .badge-new {
            background: #667eea;
            color: #fff;
        }
        
        .badge-converted {
            background: #10b981;
            color: #fff;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #666;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.show { display: flex; }
        
        .modal-content {
            background: #11112a;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-content h2 {
            margin-bottom: 20px;
        }
        
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            max-width: 85%;
        }
        
        .message.user {
            background: #667eea;
            margin-left: auto;
        }
        
        .message.bot {
            background: #1e3a5f;
        }
        
        .close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 NineM's AI - Leads</h1>
        <a href="dashboard.html">← Back to Dashboard</a>
    </div>
    
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalLeads">0</div>
                <div class="label">Total Leads</div>
            </div>
            <div class="stat-card">
                <div class="number" id="newLeads">0</div>
                <div class="label">New This Week</div>
            </div>
            <div class="stat-card">
                <div class="number" id="convertedLeads">0</div>
                <div class="label">Converted</div>
            </div>
        </div>
        
        <div class="section-title">
            <h2>All Leads</h2>
            <button class="btn btn-primary" onclick="refreshLeads()">↻ Refresh</button>
        </div>
        
        <div class="leads-grid" id="leadsList">
            <div class="empty-state">Loading leads...</div>
        </div>
    </div>
    
    <!-- Lead Detail Modal -->
    <div class="modal" id="leadModal">
        <div class="modal-content">
            <h2 id="modalTitle">Lead Details</h2>
            <div id="modalBody"></div>
            <button class="btn btn-primary" style="margin-top: 20px;" onclick="closeModal()">Close</button>
        </div>
    </div>
    
    <script>
        let leads = [];
        
        // Demo leads for display
        const demoLeads = [
            {
                id: 'lead_1',
                phone: '+1 (704) 123-4567',
                source: 'sms',
                createdAt: '2026-03-18T10:30:00Z',
                converted: false,
                messages: [
                    { role: 'user', content: 'Hi, I saw your ad and wanted to know more about your services' },
                    { role: 'assistant', content: "Great to hear from you! I'd be happy to tell you more about what we offer. What specifically are you interested in?" },
                    { role: 'user', content: 'Im looking for help with my website' }
                ]
            },
            {
                id: 'lead_2',
                phone: '+1 (704) 987-6543',
                source: 'chat',
                createdAt: '2026-03-17T14:22:00Z',
                converted: true,
                convertedAt: '2026-03-18T09:00:00Z',
                messages: [
                    { role: 'user', content: 'Do you offer a free trial?' },
                    { role: 'assistant', content: 'Yes! We offer a 14-day free trial with full access to all features.' },
                    { role: 'user', content: "That's perfect, let me sign up" }
                ]
            },
            {
                id: 'lead_3',
                phone: '+1 (704) 555-1234',
                source: 'missed-call',
                createdAt: '2026-03-16T16:45:00Z',
                converted: false,
                messages: [
                    { role: 'user', content: '*Missed call*' },
                    { role: 'assistant', content: "Hey! You called. Want to chat? Reply here or visit our website!" }
                ]
            }
        ];
        
        async function loadLeads() {
            // In production, fetch from API
            // try {
            //     const res = await fetch('/api/leads');
            //     const data = await res.json();
            //     leads = data.leads;
            // } catch (e) {
            //     console.log('Using demo leads');
            // }
            
            leads = demoLeads;
            renderLeads();
        }
        
        function renderLeads() {
            const list = document.getElementById('leadsList');
            
            if (leads.length === 0) {
                list.innerHTML = '<div class="empty-state">No leads yet. Leads will appear when customers chat or text!</div>';
                return;
            }
            
            list.innerHTML = leads.map(lead => `
                <div class="lead-card">
                    <div class="lead-info">
                        <h3>${lead.phone}</h3>
                        <div class="source">Source: ${getSourceLabel(lead.source)}</div>
                        <div class="time">${formatDate(lead.createdAt)}</div>
                        <div style="margin-top: 8px;">
                            ${lead.converted 
                                ? '<span class="badge badge-converted">✓ Converted</span>' 
                                : '<span class="badge badge-new">New</span>'}
                        </div>
                    </div>
                    <div class="lead-actions">
                        <button class="btn-small btn-view" onclick="viewLead('${lead.id}')">View Chat</button>
                        ${!lead.converted ? `<button class="btn-small btn-convert" onclick="convertLead('${lead.id}')">Convert</button>` : ''}
                    </div>
                </div>
            `).join('');
            
            // Update stats
            document.getElementById('totalLeads').textContent = leads.length;
            document.getElementById('newLeads').textContent = leads.filter(l => !l.converted).length;
            document.getElementById('convertedLeads').textContent = leads.filter(l => l.converted).length;
        }
        
        function getSourceLabel(source) {
            const labels = {
                'sms': '📱 SMS',
                'chat': '💬 Website Chat',
                'missed-call': '📞 Missed Call',
                'webhook': '🌐 Web Form'
            };
            return labels[source] || source;
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function viewLead(id) {
            const lead = leads.find(l => l.id === id);
            if (!lead) return;
            
            document.getElementById('modalTitle').textContent = `Chat with ${lead.phone}`;
            document.getElementById('modalBody').innerHTML = lead.messages.map(msg => `
                <div class="message ${msg.role === 'user' ? 'user' : 'bot'}">
                    ${msg.content}
                </div>
            `).join('');
            
            document.getElementById('leadModal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('leadModal').classList.remove('show');
        }
        
        function convertLead(id) {
            const lead = leads.find(l => l.id === id);
            if (lead) {
                lead.converted = true;
                lead.convertedAt = new Date().toISOString();
                renderLeads();
                alert('Lead marked as converted!');
            }
        }
        
        function refreshLeads() {
            loadLeads();
        }
        
        // Load on page ready
        loadLeads();
    </script>
</body>
</html>
