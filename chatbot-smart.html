<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - Smart Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 600px;
            background: #0f0f23;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h2 { font-size: 20px; margin-bottom: 5px; }
        .chat-header p { font-size: 12px; opacity: 0.9; }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            max-width: 85%;
            padding: 15px 18px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
        }
        
        .message.bot {
            background: #1e3a5f;
            color: #fff;
            border-bottom-left-radius: 4px;
        }
        
        .message.user {
            background: #667eea;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .typing {
            background: #1e3a5f;
            padding: 15px 18px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            display: none;
        }
        
        .typing.show { display: block; }
        
        .typing span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            margin: 0 3px;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .typing span:nth-child(1) { animation-delay: 0s; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }
        
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .quick-reply {
            background: #0d1b2a;
            color: #64b5f6;
            border: 1px solid #64b5f6;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-reply:hover {
            background: #64b5f6;
            color: #0d1b2a;
        }
        
        .chat-input {
            padding: 15px 20px;
            border-top: 1px solid #1e3a5f;
            display: flex;
            gap: 10px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid #1e3a5f;
            border-radius: 25px;
            background: #0f0f23;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        
        .chat-input input:focus { border-color: #667eea; }
        
        .chat-input button {
            width: 48px;
            height: 48px;
            background: #667eea;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-input button:hover { background: #5a6fd6; }
        .chat-input button svg { width: 20px; height: 20px; fill: white; }
        
        .powered-by {
            text-align: center;
            padding: 10px;
            font-size: 11px;
            color: #666;
        }
        
        .powered-by a { color: #667eea; }
        
        .ai-badge {
            display: inline-block;
            background: #27ae60;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2 id="bizName">🏠 AI Assistant <span class="ai-badge">Smart AI</span></h2>
            <p>Powered by local AI - answers intelligently!</p>
        </div>
        
        <div class="chat-messages" id="messages">
            <div class="message bot" id="welcome">
                Hi there! 👋 I'm an AI assistant for KB Fisher & Co. 
                <br><br>
                I can answer ANY question about their business - just ask!
                <br><br>
                <div class="quick-replies">
                    <span class="quick-reply" onclick="sendQuick('What services do you offer?')">Services</span>
                    <span class="quick-reply" onclick="sendQuick('How does buying a home work?')">Buying</span>
                    <span class="quick-reply" onclick="sendQuick('What areas do you serve?')">Areas</span>
                </div>
            </div>
        </div>
        
        <div class="typing" id="typing">
            <span></span><span></span><span></span>
        </div>
        
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Ask me anything..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
        
        <div class="powered-by">
            Powered by <a href="#">NineM's AI</a> (Ollama)
        </div>
    </div>
    
    <script>
        // Business knowledge - loaded from user config
        let businessInfo = {
            name: 'KB Fisher & Co',
            type: 'Real Estate',
            website: 'kbfisher.com',
            phone: '(704) 363-5120',
            email: 'info@kbfisher.com',
            locations: 'Lake Norman, Charlotte, Cornelius, Huntersville, Davidson, Denver, Mooresville, Concord',
            services: 'Buying homes, Selling homes, Relocation, Investment properties, First-time buyers',
            description: 'Family-owned real estate firm serving Lake Norman and greater Charlotte metro. Known for calm, no-pressure approach and long-term client relationships.'
        };
        
        // Chat history for context
        let chatHistory = [];
        
        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }
        
        function sendQuick(text) {
            addMessage(text, 'user');
            processWithAI(text);
        }
        
        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, 'user');
            input.value = '';
            processWithAI(text);
        }
        
        function addMessage(text, sender) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function showTyping() {
            document.getElementById('typing').classList.add('show');
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
        
        function hideTyping() {
            document.getElementById('typing').classList.remove('show');
        }
        
        // Call Ollama for smart responses
        async function processWithAI(userMessage) {
            showTyping();
            
            chatHistory.push({ role: 'user', content: userMessage });
            
            try {
                const systemPrompt = `You are a helpful AI assistant for ${businessInfo.name}, a ${businessInfo.type} business.

Business Details:
- Name: ${businessInfo.name}
- Phone: ${businessInfo.phone}
- Email: ${businessInfo.email}
- Website: ${businessInfo.website}
- Areas Served: ${businessInfo.locations}
- Services: ${businessInfo.services}
- About: ${businessInfo.description}

Guidelines:
- Answer based on the business info above
- Be friendly and professional
- Keep responses concise (2-3 short paragraphs)
- Use simple formatting
- Help convert visitors into leads by inviting contact`;

                const response = await callOllama(systemPrompt, userMessage, chatHistory);
                
                hideTyping();
                addMessage(response, 'bot');
                chatHistory.push({ role: 'assistant', content: response });
                
            } catch (error) {
                console.error('AI Error:', error);
                hideTyping();
                addMessage("I'm having trouble thinking right now. Try again in a moment!", 'bot');
            }
        }
        
        // Call Ollama API
        async function callOllama(systemPrompt, userMessage, history) {
            const messages = [
                { role: 'system', content: systemPrompt },
                ...history.slice(-6),
                { role: 'user', content: userMessage }
            ];
            
            const response = await fetch('http://localhost:11434/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: 'qwen2.5:7b',
                    messages: messages,
                    stream: false
                })
            });
            
            const data = await response.json();
            return data.message.content;
        }
        
        // Set business name
        document.getElementById('bizName').textContent = '🏠 ' + businessInfo.name;
    </script>
</body>
</html>
